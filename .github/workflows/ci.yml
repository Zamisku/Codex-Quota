name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests without code signing
        run: |
          set -o pipefail
          test_arch="$(uname -m)"
          xcodebuild \
            -project Codex-Quota.xcodeproj \
            -scheme Codex-Quota \
            -configuration Debug \
            -destination "platform=macOS,arch=${test_arch}" \
            -derivedDataPath .build/CI \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS="${test_arch}" \
            test
