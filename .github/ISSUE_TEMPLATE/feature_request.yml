name: Feature request
description: Suggest a focused improvement to Codex Quota.
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem or limitation should be addressed?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the smallest useful outcome, not only an implementation.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundaries
      options:
        - label: The proposal does not require exposing tokens to the widget.
          required: true
        - label: The proposal does not add telemetry or unrelated network destinations.
          required: true
        - label: I searched existing issues for similar requests.
          required: true
